name: Verify NPM Token

on:
  workflow_dispatch:

jobs:
  whoami:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Check token is present
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret is not visible to this workflow."
            echo "Fix: org settings → Secrets and variables → Actions → NPM_TOKEN → set visibility to 'All repositories' (or add this repo to 'Selected repositories')."
            exit 1
          fi
          echo "Token is present (length=${#NODE_AUTH_TOKEN})."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: npm whoami
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: List packages the token can publish to
        run: npm access list packages --json || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
